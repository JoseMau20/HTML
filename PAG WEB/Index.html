<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight Music</title>
    <link rel="stylesheet" href="style.css">
    <script src="App.js" defer></script>
</head>
<body>
    <header class="encabezado">
        <img class="Logo" src="Logo.avif" alt="Logo Spotlight Music">   
        <nav>
            <ul>
                <li class="dropdown"><a href="#Inicio">Inicio</a></li>
                <li class="dropdown"><a href="#Ofertas">Ofertas</a></li>
                <li class="dropdown"><a href="#Contacto">Contacto</a></li> 
            </ul>
        </nav>
        <nav class="carrito">
            <button onmouseenter="Cart()">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="black" class="bi bi-cart" viewBox="0 0 16 16">
                    <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
                </svg> 
            </button>        
        </nav>
    </header>

    <section class="portada" id="Inicio">
        <img src="Linkin2.webp" alt="Portada de la tienda" class="portada">
        <p class="descripcion">En Spotlight music nos especializamos en ofrecerle la mejor calidad de producto, porque usted es lo mejor y necesita escuchar lo mejor.</p>
    </section>

    <main class="contenedor-principal" id="Ofertas">
        </main>

    <section class="formulario" id="Contacto">
        <h2>Contáctanos</h2>
        <form>
            <div class="input">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Nombre completo">
            </div>
            <div class="input">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required placeholder="@correo.com">
            </div>
            <div class="input">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="4" required placeholder="¿En qué te podemos ayudar?"></textarea>
            </div>
            <button type="submit" class="boton-comprar" style="margin: 0 auto; display: block;">Enviar Mensaje</button>
        </form>
    </section>

    <ul id="compras" style="display:none;" class="boton-compras" onmouseleave="Cart()">
        <li></li>
    </ul>

    <footer>
        <p>&copy; 2026 Mi parcial. Derechos reservados. 
           <a href="admin.html" style="color: #444; text-decoration: none; margin-left: 15px; font-size: 0.8em;">Admin</a>
        </p>
    </footer>
</body>
</html>
